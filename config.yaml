# ── Server ─────────────────────────────────────────────────────────────
server:
  # Listen address. Default: "0.0.0.0:3000" (optional)
  listen: "0.0.0.0:3000"

  # Default request timeout in seconds. Default: 600 (optional)
  timeout: 600

  # Log level: trace | debug | info | warn | error.
  # Can be overridden by RUST_LOG. Default: info (optional)
  log_level: info

  # AES-256-GCM key for compact summary encryption (64 hex chars = 32 bytes).
  # Default: "" (no encryption) (optional)
  compact_encryption_key: ""

  # API key authentication. If at least one key is present, auth is enabled.
  # Default: no keys (auth disabled) (optional)
  auth:
    keys: []
    # Example:
    # keys:
    #   - sk-your-secret-key-here

  # CORS allow origins. Empty = allow any origin. Default: [] (optional)
  cors:
    allow_origins: []

  # Tool type allowlist. Default: ["function"] (optional)
  tool_type_allowlist:
    - function

# ── Models ─────────────────────────────────────────────────────────────
models:
  gpt-5.5:
    # Downstream model name. Defaults to the key name. (optional)
    model: deepseek-v4-pro
    provider:
      api_key: $DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com
      # Per-provider timeout in seconds. Falls back to server.timeout. (optional)
      timeout: 60

  codex-auto-review:
    model: deepseek-v4-flash
    provider:
      api_key: $DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com
